<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Camelot Unchained Ability Database</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style data-purpose="custom-fonts-and-theme">
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

        :root {
            --gold-primary: #cba86a;
            --gold-dark: #8c734b;
            --crimson-dark: #4a151f;
            --crimson-light: #7b1f32;
            --bg-dark: #121214;
            --bg-panel: #1e1e24;
            --text-muted: #a0a0a5;
            --top-bar-height: 3.5rem;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            height: 100dvh;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1e1e24 0%, #121214 100%);
            pointer-events: none;
        }

        h1, h2, h3, .font-cinzel {
            font-family: 'Cinzel', serif;
        }
    </style>
    <style data-purpose="component-styles">
        .top-bar {
            border-bottom: 1px solid var(--gold-dark);
            background-color: #1e1e24;
            background-image: linear-gradient(to bottom, #2a2a30, #1e1e24);
        }

        .accordion-btn {
            background-color: var(--tree-header-to, #2d261e);
            background-image: linear-gradient(to right, var(--tree-header-from, #453828), var(--tree-header-to, #2d261e));
            border: 1px solid var(--tree-accent-muted, var(--gold-dark));
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.45);
            transition: all 0.2s ease-in-out;
        }

        .accordion-btn:hover {
            filter: brightness(1.1);
            border-color: var(--gold-primary);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.5), 0 0 14px rgba(203, 168, 106, 0.14);
        }

        .accordion-btn:focus-visible {
            outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.5), 0 0 0 2px var(--gold-primary);
        }

        .accordion-btn.active {
            background-color: var(--tree-active-to, #2a0b12);
            background-image: linear-gradient(to right, var(--tree-active-from, var(--crimson-dark)), var(--tree-active-to, #2a0b12));
            border-color: var(--tree-accent, var(--gold-primary));
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background-color: var(--tree-content-bg, #1a1a1f);
            border-color: var(--tree-accent-muted, var(--gold-dark));
        }

        .accordion-btn .tree-title {
            color: var(--tree-accent, var(--gold-primary));
            transition: color 0.3s ease;
        }

        .accordion-btn.active .tree-title {
            color: #e0e0e0;
        }

        .accordion-btn .chevron {
            color: var(--tree-accent-muted, var(--gold-dark));
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .accordion-btn.active .chevron {
            color: var(--tree-accent, var(--gold-primary));
        }

        .ability-card {
            background-color: var(--bg-panel);
            border: 2px solid transparent;
            border-image: linear-gradient(to bottom right, var(--tree-border-from, var(--gold-primary)), var(--tree-border-mid, var(--gold-dark)), var(--tree-border-to, #4a3c26)) 1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
            position: relative;
        }

        .ability-card::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1px solid var(--tree-accent-muted, var(--gold-dark));
            opacity: 0.3;
            pointer-events: none;
        }

        .card-header-bg {
            background: linear-gradient(to right, var(--tree-card-header-from, var(--crimson-dark)), transparent);
            border-bottom: 1px solid var(--tree-accent-muted, var(--gold-dark));
        }

        .ability-card-divider {
            border-color: var(--tree-accent, var(--gold-primary));
        }

        .ability-icon {
            background: linear-gradient(135deg, var(--tree-icon-from, #3a2b1f), var(--tree-icon-to, #1a140f));
            border: 2px solid var(--tree-accent, var(--gold-primary));
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
            color: var(--tree-accent, var(--gold-primary));
        }

        .metadata-icon-muted {
            color: var(--tree-accent-muted, var(--gold-dark));
        }

        .metadata-icon-accent {
            color: var(--tree-accent, var(--gold-primary));
        }

        .class-card {
            border: 1px solid var(--gold-dark);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.45), 0 4px 6px rgba(0,0,0,0.45);
            color: var(--gold-primary);
            transition: all 0.2s ease-in-out;
        }

        .class-card:hover {
            border-color: var(--tree-accent, var(--gold-primary));
            box-shadow: inset 0 0 18px rgba(203, 168, 106, 0.14), 0 8px 14px rgba(0,0,0,0.55);
            transform: translateY(-0.25rem);
            filter: brightness(1.06);
        }

        .class-card:focus-visible {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: inset 0 0 18px rgba(203, 168, 106, 0.16), 0 8px 14px rgba(0,0,0,0.55), 0 0 0 2px var(--gold-primary);
        }

        .faction-title {
            color: var(--tree-accent, var(--gold-primary));
            border-bottom: 1px solid var(--tree-accent-muted, var(--gold-dark));
        }

        #search-input:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-dark);
            border-radius: 3px;
        }

        .class-view-tab {
            border: 1px solid var(--gold-dark);
            background: linear-gradient(to bottom, #2a2a30, #1e1e24);
            color: var(--text-muted);
            transition: all 0.2s ease-in-out;
        }

        .class-view-tab:hover {
            border-color: var(--gold-primary);
            color: #e0e0e0;
        }

        .class-view-tab.active {
            border-color: var(--tab-accent, var(--gold-primary));
            background: linear-gradient(to right, color-mix(in srgb, var(--tab-accent, var(--gold-primary)) 18%, #1e1e24), #1a1a1f);
            color: var(--tab-accent, var(--gold-primary));
            box-shadow: 0 0 12px color-mix(in srgb, var(--tab-accent, var(--gold-primary)) 25%, transparent);
        }

        .guide-panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--gold-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        }

        .guide-section-title {
            color: var(--guide-accent, var(--gold-primary));
            border-bottom: 1px solid color-mix(in srgb, var(--guide-accent, var(--gold-primary)) 35%, transparent);
        }

        .guide-callout {
            border-left: 3px solid var(--guide-accent, var(--gold-primary));
            background: color-mix(in srgb, var(--guide-accent, var(--gold-primary)) 8%, #1a1a1f);
            color: #c8c8cc;
        }

        .guide-meta-chip {
            border: 1px solid color-mix(in srgb, var(--guide-accent, var(--gold-primary)) 40%, transparent);
            background: color-mix(in srgb, var(--guide-accent, var(--gold-primary)) 10%, #121214);
            color: #d8d8dc;
        }

        .guide-quick-ref {
            background: linear-gradient(to bottom right, #1a1a1f, #121214);
            border: 1px solid var(--gold-dark);
        }

        .guide-lead {
            color: var(--guide-accent, var(--gold-primary));
        }

        .guide-markdown h1,
        .guide-markdown h2,
        .guide-markdown h3 {
            font-family: 'Cinzel', serif;
            color: var(--guide-accent, var(--gold-primary));
        }

        .guide-markdown h1 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .guide-markdown h2 {
            font-size: 1.25rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid color-mix(in srgb, var(--guide-accent, var(--gold-primary)) 35%, transparent);
        }

        .guide-markdown h3 {
            font-size: 1.05rem;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .guide-markdown p,
        .guide-markdown li {
            color: #cccccc;
            line-height: 1.65;
        }

        .guide-markdown blockquote {
            border-left: 3px solid var(--guide-accent, var(--gold-primary));
            background: color-mix(in srgb, var(--guide-accent, var(--gold-primary)) 8%, #1a1a1f);
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            color: #c8c8cc;
            font-style: italic;
        }

        .guide-markdown hr {
            border-color: #8c734b40;
            margin: 1.5rem 0;
        }

        .guide-markdown ul,
        .guide-markdown ol {
            padding-left: 1.25rem;
            margin: 0.75rem 0;
        }

        .guide-markdown strong {
            color: #e0e0e0;
        }

        .guide-markdown code {
            color: var(--gold-primary);
            background: #121214;
            padding: 0.1rem 0.35rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
        }
    </style>
</head>
<body class="antialiased">
    <header class="top-bar fixed top-0 left-0 w-full z-50 flex items-center justify-center px-4 pt-[max(0.75rem,env(safe-area-inset-top))] pb-3 shadow-lg">
        <button id="home-logo" type="button" aria-label="Home" class="cursor-pointer rounded transition-all duration-200 ease-in-out hover:scale-105 hover:brightness-110 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#cba86a] focus-visible:ring-offset-2 focus-visible:ring-offset-[#1e1e24]">
            <img src="./assets/cu_title_03_fixed.png" alt="Camelot Unchained" class="h-8 sm:h-10 w-auto max-w-[min(100%,16rem)] object-contain pointer-events-none"/>
        </button>
    </header>

    <main class="px-4 sm:px-6 lg:px-8 pt-[var(--top-bar-height)] pb-[max(1rem,env(safe-area-inset-bottom))]">
        <div class="max-w-5xl mx-auto w-full flex flex-col items-start">
            <div id="class-nav-row" class="w-full flex overflow-x-auto gap-3 pb-2 mb-4 scrollbar-hide hidden mt-6"></div>
            <div id="active-class-hero" class="hidden mb-6 w-full"></div>
            <div id="class-view-tabs" class="hidden w-full mb-6"></div>
            <div id="search-bar-container" class="hidden mb-6 w-full">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="group/search relative flex-1 min-w-0 rounded transition-all duration-200 ease-in-out focus-within:ring-2 focus-within:ring-[#cba86a]/35">
                        <input type="text" id="search-input" disabled placeholder="Search class abilities and metadata..." class="border border-[#8c734b] ring-2 ring-transparent rounded px-3 py-2 pl-9 text-sm text-[#e0e0e0] bg-[#1e1e24] w-full transition-all duration-200 ease-in-out focus:outline-none focus:border-[#cba86a] focus:ring-transparent placeholder:text-[#8c734b] disabled:opacity-45 disabled:cursor-not-allowed"/>
                        <svg class="w-4 h-4 text-[#8c734b] group-focus-within/search:text-[#cba86a] absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none transition-colors duration-200 ease-in-out" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                        <button type="button" id="clear-search" disabled class="hidden absolute inset-y-0 right-0 flex items-center pr-3 text-[#8c734b] hover:text-[#cba86a] focus:outline-none focus-visible:text-[#e0e0e0] focus-visible:ring-2 focus-visible:ring-[#cba86a] rounded transition-all duration-200 ease-in-out cursor-pointer disabled:opacity-45 disabled:cursor-not-allowed" aria-label="Clear search input">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <button type="button" id="export-ai-btn" class="w-full sm:w-44 flex-shrink-0 flex items-center justify-center text-center gap-2 rounded px-3 py-2 cursor-pointer bg-gradient-to-b from-[#2d261e] to-[#1e1a14] hover:from-[#453828] hover:to-[#2d261e] hover:brightness-110 border border-[#cba86a] text-[#cba86a] font-cinzel font-bold text-sm tracking-wider uppercase shadow-[inset_0_0_8px_rgba(0,0,0,0.5),0_2px_4px_rgba(0,0,0,0.3)] transition-all duration-200 ease-in-out focus:outline-none focus-visible:ring-2 focus-visible:ring-[#cba86a] focus-visible:ring-offset-2 focus-visible:ring-offset-[#121214]" aria-label="Copy class abilities for AI">
                        <svg class="w-4 h-4 export-ai-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        <span class="export-ai-label">Copy for AI</span>
                    </button>
                </div>
                <div id="filter-container" class="flex flex-wrap gap-2 mt-4 hidden"></div>
            </div>
            <div id="accordion-container" class="w-full self-start space-y-4 pb-4">
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js?v=1.0.3"></script>
</body>
</html>
